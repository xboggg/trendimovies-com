<svg xmlns="http://www.w3.org/2000/svg" width="500" height="750" viewBox="0 0 500 750">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="750" fill="url(#bg)"/>
  <rect x="0" y="0" width="500" height="750" fill="none" stroke="#2a2a4a" stroke-width="2"/>
  <!-- Film icon -->
  <rect x="175" y="290" width="150" height="110" rx="8" fill="none" stroke="#3a3a5a" stroke-width="2"/>
  <rect x="155" y="300" width="20" height="20" rx="4" fill="#3a3a5a"/>
  <rect x="155" y="330" width="20" height="20" rx="4" fill="#3a3a5a"/>
  <rect x="155" y="360" width="20" height="20" rx="4" fill="#3a3a5a"/>
  <rect x="325" y="300" width="20" height="20" rx="4" fill="#3a3a5a"/>
  <rect x="325" y="330" width="20" height="20" rx="4" fill="#3a3a5a"/>
  <rect x="325" y="360" width="20" height="20" rx="4" fill="#3a3a5a"/>
  <!-- Lines inside film -->
  <line x1="175" y1="315" x2="325" y2="315" stroke="#3a3a5a" stroke-width="1"/>
  <line x1="175" y1="385" x2="325" y2="385" stroke="#3a3a5a" stroke-width="1"/>
  <text x="250" y="460" font-family="Arial, sans-serif" font-size="18" fill="#4a4a6a" text-anchor="middle">No Poster Available</text>
</svg>
